[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "open-voice-runtime"
version = "0.1.0"
description = "SDK-first realtime voice runtime for Open Voice."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "Open Voice Contributors" }
]
dependencies = []

[project.optional-dependencies]
server = [
  "fastapi>=0.115",
  "httpx>=0.28",
  "uvicorn>=0.34",
  "websockets>=15.0"
]
redis = [
  "redis>=5.0"
]
stt-moonshine = [
  "moonshine-voice==0.0.49"
]
vad-silero = [
  "torch>=2.10",
  "torchaudio>=2.10",
  "onnxruntime>=1.22",
  "numpy>=2.1",
  "silero-vad>=6.2.1"
]
tts-kokoro = [
  "kokoro-onnx>=0.5.0"
]
dev = [
  "mypy>=1.10",
  "pytest>=8.3",
  "pytest-asyncio>=0.23",
  "ruff>=0.11"
]

[tool.hatch.build.targets.wheel]
packages = ["src/open_voice_runtime"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_configs = true

[tool.pytest.ini_options]
markers = [
  "asyncio: mark a test as async and run in event loop",
  "anyio: mark a test to run with anyio",
]
