<svg xmlns="http://www.w3.org/2000/svg" width="528" height="144" class="svgbob"><style>.svgbob line, .svgbob path, .svgbob circle, .svgbob rect, .svgbob polygon {
    stroke: white;
    stroke-width: 2;
    stroke-opacity: 1;
    fill-opacity: 1;
    stroke-linecap: round;
    stroke-linejoin: miter;
}
.svgbob rect {
    stroke: black;
}
.svgbob text {
    white-space: pre;
    fill: white;
    font-family: Iosevka Fixed, monospace;
    font-size: 14px;
}
.svgbob rect.backdrop {
    stroke: none;
    fill: black;
}
.svgbob .broken {
    stroke-dasharray: 8;
}
.svgbob .filled {
    fill: black;
}
.svgbob .bg_filled {
    fill: black;
    stroke-width: 1;
}
.svgbob .nofill {
    fill: black;
}
.svgbob .end_marked_arrow {
    marker-end: url(#arrow);
}
.svgbob .start_marked_arrow {
    marker-start: url(#arrow);
}
.svgbob .end_marked_diamond {
    marker-end: url(#diamond);
}
.svgbob .start_marked_diamond {
    marker-start: url(#diamond);
}
.svgbob .end_marked_circle {
    marker-end: url(#circle);
}
.svgbob .start_marked_circle {
    marker-start: url(#circle);
}
.svgbob .end_marked_open_circle {
    marker-end: url(#open_circle);
}
.svgbob .start_marked_open_circle {
    marker-start: url(#open_circle);
}
.svgbob .end_marked_big_open_circle {
    marker-end: url(#big_open_circle);
}
.svgbob .start_marked_big_open_circle {
    marker-start: url(#big_open_circle);
}<!--separator--></style><defs><marker id="arrow" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><polygon points="0,0 0,4 4,2 0,0"></polygon></marker><marker id="diamond" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><polygon points="0,2 2,0 4,2 2,4 0,2"></polygon></marker><marker id="circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><circle cx="4" cy="4" r="2" class="filled"></circle></marker><marker id="open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><circle cx="4" cy="4" r="2" class="bg_filled"></circle></marker><marker id="big_open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><circle cx="4" cy="4" r="3" class="bg_filled"></circle></marker></defs><rect class="backdrop" x="0" y="0" width="528" height="144"></rect><rect x="2" y="8" width="516" height="116" class="solid nofill" rx="0"></rect><rect x="6" y="12" width="508" height="108" class="solid nofill" rx="0"></rect><text x="194" y="92" >O</text><text x="210" y="92" >P</text><text x="226" y="92" >E</text><text x="242" y="92" >N</text><text x="274" y="92" >V</text><text x="290" y="92" >O</text><text x="306" y="92" >I</text><text x="322" y="92" >C</text><text x="338" y="92" >E</text><g><line x1="172" y1="40" x2="188" y2="40" class="solid"></line><line x1="172" y1="40" x2="172" y2="72" class="solid"></line><line x1="188" y1="40" x2="188" y2="72" class="solid"></line><line x1="144" y1="72" x2="172" y2="72" class="solid"></line><line x1="236" y1="40" x2="268" y2="40" class="solid"></line><line x1="236" y1="40" x2="236" y2="72" class="solid"></line><line x1="268" y1="40" x2="268" y2="72" class="solid"></line><line x1="204" y1="56" x2="220" y2="56" class="solid"></line><line x1="204" y1="56" x2="204" y2="72" class="solid"></line><line x1="220"