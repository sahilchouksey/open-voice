<svg xmlns="http://www.w3.org/2000/svg" width="528" height="144" viewBox="0 0 528 144" role="img" aria-labelledby="openvoice-logo-title openvoice-logo-desc">
  <title id="openvoice-logo-title">Open Voice Logo</title>
  <desc id="openvoice-logo-desc">Framed mark with waveform bars and OPEN VOICE wordmark.</desc>

  <defs>
    <style>
      .panel {
        fill: #ffffff;
        stroke: #0d1117;
        stroke-width: 2;
      }

      .panel-inner {
        fill: none;
        stroke: #30363d;
        stroke-width: 1.5;
      }

      .axis {
        stroke: #0d1117;
        stroke-width: 2;
        stroke-linecap: round;
      }

      .bar {
        fill: #0d1117;
      }

      .wordmark {
        fill: #0d1117;
        font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 6px;
      }
    </style>
  </defs>

  <rect x="64" y="20" width="400" height="104" class="panel" />
  <rect x="70" y="26" width="388" height="92" class="panel-inner" />

  <line x1="200" y1="72" x2="328" y2="72" class="axis" />

  <rect x="222" y="44" width="12" height="28" class="bar" />
  <rect x="247" y="56" width="12" height="16" class="bar" />
  <rect x="272" y="44" width="24" height="28" class="bar" />
  <rect x="309" y="56" width="12" height="16" class="bar" />
  <rect x="334" y="44" width="12" height="28" class="bar" />

  <text x="264" y="96" text-anchor="middle" class="wordmark">OPEN VOICE</text>
</svg>
